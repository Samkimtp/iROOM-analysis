<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iROOM Vision Practice - Student</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/essentia.js@0.1.3/dist/essentia.js-core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/essentia.js@0.1.3/dist/essentia-wasm.web.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #F8FAFC; touch-action: manipulation; }
        .active-ring { ring: 4px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .metro-flash { background-color: rgba(34, 197, 94, 0.6) !important; transition: background-color 0.05s ease-out; }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-6">

<div class="w-full max-w-[480px] space-y-6">
    <div class="bg-slate-900 rounded-[2.5rem] p-6 text-white shadow-2xl">
        <div class="flex justify-between items-center mb-2">
            <span class="text-[10px] font-black text-blue-400 uppercase italic tracking-widest">Rhythm Accuracy</span>
            <div id="rhythmIndicator" class="w-2 h-2 rounded-full bg-slate-700"></div>
        </div>
        <div class="flex items-baseline gap-1">
            <div id="accuracyDisplay" class="text-6xl font-black tracking-tighter">00</div>
            <div class="text-xl font-bold text-blue-400">%</div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div id="metroArea" onclick="toggleMetronome()" class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm cursor-pointer transition-all active:scale-95">
            <span class="text-[10px] font-black text-blue-600 uppercase mb-4 block italic">METRONOME</span>
            <div id="bpmDisplay" class="text-5xl font-black text-slate-800 mb-4 tracking-tighter">120</div>
            <input type="range" id="bpmSlider" min="40" max="240" value="120" onclick="event.stopPropagation()" oninput="updateBpm(this.value)" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer">
        </div>

        <div id="tunerArea" onclick="toggleTuner()" class="bg-slate-900 p-6 rounded-[2rem] text-white cursor-pointer transition-all active:scale-95 overflow-hidden">
            <span class="text-[10px] font-black text-blue-400 uppercase mb-4 block italic">TUNER</span>
            <div id="noteDisplay" class="text-4xl font-black mb-1">--</div>
            <div id="octaveDisplay" class="text-[10px] font-bold text-blue-400 uppercase">Ready...</div>
        </div>
    </div>

    <div id="videoArea" onclick="handleVideoCycle()" class="relative aspect-[3/4] bg-slate-900 rounded-[2.5rem] overflow-hidden shadow-lg cursor-pointer">
        <video id="webcam" autoplay playsinline class="w-full h-full object-cover scale-x-[-1] opacity-0 transition-opacity"></video>
        <div id="videoOverlay" class="absolute inset-0 flex flex-col items-center justify-center text-white/40">
            <i id="camIcon" data-lucide="video-off" class="w-12 h-12 mb-4"></i>
            <span id="videoGuideText" class="text-[10px] font-black uppercase tracking-widest">Tap to Practice</span>
        </div>
    </div>
</div>

<canvas id="recordingCanvas" width="720" height="960" class="hidden"></canvas>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzOxGjLQX1nZZODTLK4AuRkENvx2ShNkgJFtvaKd1RzyBy2MqGWNzyxBKZ5geRQG3fa/exec";
    let audioCtx = null, essentia = null, isTunerOn = false, isMetroOn = false, analyser = null, buf = new Float32Array(2048);
    let bpm = 120, nextTickTime = 0, currentNote = "--", currentPitch = 0, scores = [];

    // [핵심] 선생님께 실시간 데이터 전송
    function sendStatusToTeacher() {
        const data = {
            bpm: bpm,
            isMetro: isMetroOn,
            note: currentNote,
            accuracy: document.getElementById('accuracyDisplay').innerText
        };
        const query = new URLSearchParams({mode: 'update_status', user: 'S', data: JSON.stringify(data)});
        const script = document.createElement('script');
        script.src = `${GAS_URL}?${query.toString()}&callback=cb_void`;
        document.head.appendChild(script);
        document.head.removeChild(script);
    }
    window.cb_void = () => {};
    setInterval(sendStatusToTeacher, 3000); // 3초마다 상태 공유

    // ... (기존 iROOM v4.5의 Audio/Metro/Tuner 로직 삽입) ...
    // 대표님이 주신 코드의 startListening, updateLoop, toggleMetronome 등을 그대로 유지합니다.
    function updateBpm(v){ bpm=v; document.getElementById('bpmDisplay').innerText=v; }
    
    // 생략된 로직들은 기존 v4.5 소스코드를 그대로 사용하시면 됩니다.
</script>
</body>
</html>
