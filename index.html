<script>
    // 1. 대표님의 GAS URL (iroom_analysis 연결용)
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwXed035mJ0V11U75_8Gb-5Bj2YvGIlkwEWjAc163LnxRSqozOpyo7f9ox8RnJFNwv00w/exec";
    
    // 2. [S1 해결] URL 파라미터에서 이름을 가져오고, 없으면 기본값 설정
    const urlParams = new URLSearchParams(window.location.search);
    const user = urlParams.get('user') || 'iROOM_Tester'; 

    let audioCtx, analyser, buf = new Float32Array(2048), isMetroOn = false, bpm = 120, currentPitch = 0, currentNote = "--", cents = 0;
    const noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    // ... (중략: initEngine, drawWave, updateLoop, autoCorrelate 등 UI 로직) ...

    // 3. [데이터 매칭] 시트 항목에 맞춰 전송하는 핵심 함수
    function syncStatus() {
        if (!audioCtx || currentPitch === 0) return;

        // 시트 컬럼 구성에 맞춘 데이터 패키징
        const data = { 
            b: bpm,                                     // bpm 항목으로
            a: document.getElementById('accuracyDisplay').innerText, // accuracy 항목으로
            n: `${currentNote} (${currentPitch}Hz)`,    // note & pitch 항목으로 통합
            c: cents                                    // (필요시 시트에서 확장 가능)
        };

        const script = document.createElement('script');
        
        // [수정] user=S1 고정값을 user=${user} 변수로 교체
        script.src = `${GAS_URL}?mode=update_status&user=${user}&data=${encodeURIComponent(JSON.stringify(data))}&callback=cb_void&_=${Date.now()}`;
        
        document.head.appendChild(script); 
        setTimeout(() => {
            if (document.head.contains(script)) document.head.removeChild(script);
        }, 500);
    }

    // 0.8초마다 실시간 전송
    setInterval(syncStatus, 800); 
    window.cb_void = () => {};
</script>
