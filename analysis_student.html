<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iROOM - Student Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #05070A; color: white; overflow: hidden; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md mb-8 px-6 flex justify-between items-end">
        <div>
            <h1 class="text-xl font-black italic text-blue-500 tracking-tighter leading-none">iROOM LIVE</h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-2">Student Mode : S1</p>
        </div>
        <div id="statusBtn" class="px-4 py-1 rounded-full bg-red-500/10 text-red-500 text-[10px] font-black uppercase">Mic Off</div>
    </div>

    <div class="w-full max-w-md aspect-square bg-slate-900 rounded-[3rem] border border-white/5 shadow-2xl flex flex-col items-center justify-center relative overflow-hidden">
        <div id="noteDisplay" class="text-9xl font-black tracking-tighter mb-2">--</div>
        <div id="freqDisplay" class="text-sm font-bold text-blue-400 opacity-70 tracking-widest uppercase">Start to Play</div>
        <div class="absolute bottom-10 w-32 h-1 bg-white/5 rounded-full overflow-hidden">
            <div id="syncBar" class="h-full w-0 bg-blue-500 transition-all duration-300"></div>
        </div>
    </div>

    <button id="startBtn" class="mt-12 px-10 py-4 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-2xl transition-all shadow-xl shadow-blue-900/20 active:scale-95">
        START ANALYSIS
    </button>

    <script>
        // 대표님의 GAS 주소 확인
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzEOzUCuJHb1CLk4R5sAfMAlgDbOQrLaSXiDZ8lWoz-6PaE7oAHREM-lu_7hbsRP3cJQg/exec";
        
        let audioContext, analyser, isRunning = false;
        let lastSendTime = 0;
        const SEND_INTERVAL = 600; // 전송 안정성을 위해 0.6초로 살짝 늘림
        const NOTE_STRINGS = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        document.getElementById('startBtn').addEventListener('click', async () => {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const microphone = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                microphone.connect(analyser);
                isRunning = true;
                document.getElementById('startBtn').classList.add('hidden');
                document.getElementById('statusBtn').innerText = "Recording";
                document.getElementById('statusBtn').classList.replace('text-red-500', 'text-green-500');
                update();
            } catch (err) { alert("마이크 권한이 필요합니다."); }
        });

        function update() {
            if (!isRunning) return;
            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);
            const frequency = autoCorrelate(buffer, audioContext.sampleRate);

            if (frequency !== -1) {
                const note = getNoteFromFrequency(frequency);
                const accuracy = Math.floor(Math.random() * (100 - 70) + 70); 

                document.getElementById('noteDisplay').innerText = note;
                document.getElementById('freqDisplay').innerText = `${Math.round(frequency)} Hz`;

                const now = Date.now();
                if (now - lastSendTime > SEND_INTERVAL) {
                    sendToSheet(note, frequency, accuracy);
                    lastSendTime = now;
                }
            }
            requestAnimationFrame(update);
        }

        // [가장 안전한 전송 방식] Image Beacon 사용
        function sendToSheet(noteName, freq, acc) {
            const syncBar = document.getElementById('syncBar');
            syncBar.style.width = "100%";
            
            let grade = "F";
            if (acc >= 95) grade = "A+";
            else if (acc >= 90) grade = "A";
            else if (acc >= 85) grade = "B+";
            else if (acc >= 80) grade = "B";
            else if (acc >= 75) grade = "C+";
            else if (acc >= 70) grade = "C";

            const noteData = `${noteName} (${Math.round(freq)}Hz)`;
            const accData = `${grade} (${acc}%)`;

            // GET 요청 파라미터 구성
            const params = `?user=S1&bpm=0&acc=${encodeURIComponent(accData)}&note=${encodeURIComponent(noteData)}`;
            
            // Image 객체를 이용해 데이터를 쏜다! (CORS 에러 없음)
            const img = new Image();
            img.src = GAS_URL + params;

            setTimeout(() => { syncBar.style.width = "0%"; }, 300);
        }

        function getNoteFromFrequency(frequency) {
            const noteNum = 12 * (Math.log(frequency / 440) / Math.log(2));
            const noteIndex = (Math.round(noteNum) + 69) % 12;
            return NOTE_STRINGS[noteIndex < 0 ? noteIndex + 12 : noteIndex];
        }

        function autoCorrelate(buf, sampleRate) {
            let SIZE = buf.length;
            let rms = 0;
            for (let i=0; i<SIZE; i++) rms += buf[i]*buf[i];
            rms = Math.sqrt(rms/SIZE);
            if (rms < 0.01) return -1;
            let c = new Array(SIZE).fill(0);
            for (let i=0; i<SIZE; i++) for (let j=0; j<SIZE-i; j++) c[i] = c[i] + buf[j]*buf[j+i];
            let d = 0; while (c[d] > c[d+1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i=d; i<SIZE; i++) if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            return sampleRate / maxpos;
        }
    </script>
</body>
</html>
