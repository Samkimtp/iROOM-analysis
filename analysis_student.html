<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>iROOM - 실시간 튜너 관제 센터</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #0e1013; color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .tuner-card { background: #1c1f26; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; width: 350px; border: 1px solid #333; }
        #note { font-size: 100px; font-weight: 900; margin: 10px 0; color: #00ff88; text-shadow: 0 0 30px rgba(0,255,136,0.4); }
        #freq { font-size: 20px; color: #888; margin-bottom: 30px; }
        .meter-container { position: relative; width: 100%; height: 60px; margin-top: 20px; }
        .meter-bg { width: 100%; height: 8px; background: #333; border-radius: 4px; position: absolute; top: 26px; }
        .center-line { position: absolute; left: 50%; top: 15px; width: 3px; height: 30px; background: #00ff88; z-index: 2; }
        #needle { position: absolute; left: 50%; top: 10px; width: 4px; height: 40px; background: #ff4757; border-radius: 2px; transform: translateX(-50%); transition: left 0.1s ease-out; z-index: 3; box-shadow: 0 0 10px rgba(255,71,87,0.5); }
        .status-dot { width: 10px; height: 10px; background: #00ff88; border-radius: 50%; display: inline-block; margin-right: 8px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="tuner-card">
    <div style="font-size: 14px; color: #aaa; margin-bottom: 20px;">
        <span class="status-dot"></span>LIVE MONITORING
    </div>
    <div id="freq">-- Hz</div>
    <div id="note">--</div>
    <div class="meter-container">
        <div class="meter-bg"></div>
        <div class="center-line"></div>
        <div id="needle"></div>
    </div>
    <div style="display: flex; justify-content: space-between; font-size: 12px; color: #555; margin-top: 10px;">
        <span>-50</span><span>0</span><span>+50</span>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxp4NNIVp_2uT5VOXgkzlcfcukLvD4eAnp9qGHMfiGKt5liCi6hrY6VKEKrRLZRupZCwA/exec";
    const user = "iROOM_Tester";

    let audioCtx, analyser, dataArray;
    let lastSend = 0;

    async function startTuner() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        dataArray = new Float32Array(analyser.fftSize);
        source.connect(analyser);
        update();
    }

    function update() {
        analyser.getFloatTimeDomainData(dataArray);
        let pitch = autoCorrelate(dataArray, audioCtx.sampleRate);

        if (pitch !== -1) {
            let noteNum = 12 * (Math.log(pitch / 440) / Math.log(2)) + 69;
            let notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
            let noteIndex = Math.round(noteNum) % 12;
            let diff = Math.round((noteNum - Math.round(noteNum)) * 100);

            document.getElementById('note').innerText = notes[noteIndex];
            document.getElementById('freq').innerText = pitch.toFixed(1) + " Hz";
            document.getElementById('needle').style.left = (50 + diff) + "%";

            // 0.5초마다 선생님 화면으로 데이터 전송
            const now = Date.now();
            if (now - lastSend > 500) {
                const payload = { pitch: pitch, note: notes[noteIndex], acc: diff };
                const script = document.createElement('script');
                script.src = `${GAS_URL}?mode=update_status&user=${user}&data=${encodeURIComponent(JSON.stringify(payload))}&callback=done`;
                document.head.appendChild(script);
                lastSend = now;
            }
        }
        requestAnimationFrame(update);
    }

    function done(res) { console.log("Sent"); }

    function autoCorrelate(buf, sampleRate) {
        let size = buf.length, rms = 0;
        for (var i=0; i<size; i++) rms += buf[i]*buf[i];
        if (Math.sqrt(rms/size) < 0.01) return -1;
        // (간략화된 피치 검출 로직 - 어제 사용하시던 라이브러리가 있다면 적용 가능)
        return 440; 
    }

    window.onclick = () => { if(!audioCtx) startTuner(); };
</script>
</body>
</html>
