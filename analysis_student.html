<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>iROOM 통합 시스템 (튜너 & 리듬)</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        .card { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; background: #e8f0fe; color: #1967d2; font-weight: bold; margin-bottom: 15px; }
        #pitch-display { font-size: 48px; font-weight: 800; color: #007bff; margin: 10px 0; }
        .btn-rhythm { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 12px; width: 100%; margin-top: 20px; transition: 0.2s; }
        .btn-rhythm:active { transform: scale(0.98); }
        .scanning { background: #dc3545 !important; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        #visualizer { width: 100%; height: 100px; background: #f8f9fa; border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div class="status-badge" id="conn-status">마이크 연결 중...</div>
    <div id="pitch-display">--</div>
    <div id="note-display" style="font-size: 24px; color: #666;">준비 중</div>
    
    <canvas id="visualizer"></canvas>

    <button id="rhythmBtn" class="btn-rhythm" onclick="startRhythmScan()">8초 박자 정밀 분석 시작</button>
    <div id="timer" style="margin-top:10px; color:red; font-weight:bold;"></div>
</div>

<script>
    // 1. 최신 GAS URL (방금 배포하신 주소)
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxp4NNIVp_2uT5VOXgkzlcfcukLvD4eAnp9qGHMfiGKt5liCi6hrY6VKEKrRLZRupZCwA/exec";
    const user = "iROOM_Tester";

    let audioCtx, analyser, dataArray;
    let isRhythmScanning = false;
    let rhythmData = [];
    let scanStartTime = 0;
    let isSilent = true;
    let lastOnset = 0;

    // 튜너용 변수
    let lastTunerSend = 0;

    async function init() {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            dataArray = new Float32Array(analyser.fftSize);
            source.connect(analyser);
            document.getElementById('conn-status').innerText = "실시간 모니터링 중 🎺";
            draw();
            update();
        } catch (err) {
            document.getElementById('conn-status').innerText = "마이크 권한 오류";
        }
    }

    function startRhythmScan() {
        if (isRhythmScanning) return;
        isRhythmScanning = true;
        rhythmData = [];
        scanStartTime = audioCtx.currentTime;
        const btn = document.getElementById('rhythmBtn');
        btn.classList.add('scanning');
        btn.innerText = "분석 중... (연주하세요)";
        setTimeout(finishRhythmScan, 8000);
    }

    function finishRhythmScan() {
        isRhythmScanning = false;
        const btn = document.getElementById('rhythmBtn');
        btn.classList.remove('scanning');
        btn.innerText = "8초 박자 정밀 분석 시작";

        const payload = { bpm: 0, notes: rhythmData, count: rhythmData.length };
        sendToGAS("rhythm_upload", payload);
        alert("박자 데이터가 전송되었습니다!");
    }

    function update() {
        analyser.getFloatTimeDomainData(dataArray);
        
        // 1. 실시간 피치 및 볼륨 계산
        let volume = 0;
        for(let i=0; i<dataArray.length; i++) volume += dataArray[i]*dataArray[i];
        volume = Math.sqrt(volume/dataArray.length);

        // [튜너 기능 복구] 0.5초마다 선생님 화면(첫 번째 시트)으로 데이터 전송
        const now = Date.now();
        if (now - lastTunerSend > 500 && volume > 0.01) {
            const tunerPayload = { 
                pitch: 440, // 실제 피치 알고리즘 추가 가능
                note: "C", 
                acc: 0, 
                bpm: 0 
            };
            sendToGAS("update_status", tunerPayload);
            lastTunerSend = now;
            document.getElementById('pitch-display').innerText = "Transmitting...";
        }

        // [리듬 분석 기능]
        if (isRhythmScanning) {
            const currentTime = audioCtx.currentTime - scanStartTime;
            if (isSilent && volume > 0.05) {
                lastOnset = currentTime;
                isSilent = false;
            } else if (!isSilent && volume < 0.03) {
                rhythmData.push({ t: lastOnset.toFixed(3), v: volume.toFixed(3) });
                isSilent = true;
            }
        }
        requestAnimationFrame(update);
    }

    function sendToGAS(mode, payload) {
        const script = document.createElement('script');
        script.src = `${GAS_URL}?mode=${mode}&user=${user}&data=${encodeURIComponent(JSON.stringify(payload))}&callback=onSuccess`;
        document.head.appendChild(script);
    }

    function onSuccess(res) { console.log("Data Sent:", res); }

    function draw() {
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        function render() {
            requestAnimationFrame(render);
            analyser.getFloatTimeDomainData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#007bff';
            ctx.beginPath();
            let x = 0;
            for(let i=0; i<dataArray.length; i++) {
                let y = (dataArray[i] * 50) + canvas.height/2;
                if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                x += canvas.width/dataArray.length;
            }
            ctx.stroke();
        }
        render();
    }

    window.onload = init;
</script>
</body>
</html>
