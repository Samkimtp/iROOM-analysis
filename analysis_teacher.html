<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iROOM Analysis - Teacher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #0F172A; color: white; }
        .data-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-6">
<div class="w-full max-w-[480px] space-y-6">
    <div class="flex justify-between items-center px-2">
        <div><h1 class="text-2xl font-black italic tracking-tighter text-blue-400">iROOM MONITOR</h1><p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Teacher Mode</p></div>
        <div class="flex items-center gap-2 bg-slate-800 px-3 py-1 rounded-full"><div id="connIndicator" class="w-2 h-2 rounded-full bg-red-500"></div><span id="connText" class="text-[10px] font-bold uppercase">Offline</span></div>
    </div>
    <div class="data-card rounded-[2.5rem] p-8 shadow-2xl">
        <span class="text-[10px] font-black text-blue-400 uppercase italic mb-2 block">Student Accuracy</span>
        <div class="flex items-baseline gap-1"><div id="m-acc" class="text-8xl font-black tracking-tighter">00</div><div class="text-2xl font-bold text-blue-400">%</div></div>
    </div>
    <div class="grid grid-cols-2 gap-4">
        <div class="data-card p-6 rounded-[2rem]"><span class="text-[10px] font-black text-slate-400 uppercase mb-2 block italic">BPM</span><div id="m-bpm" class="text-5xl font-black tracking-tighter">--</div></div>
        <div class="data-card p-6 rounded-[2rem] border-l-4 border-l-blue-500"><span class="text-[10px] font-black text-blue-400 uppercase mb-2 block italic">Note</span><div id="m-note" class="text-5xl font-black tracking-tighter">--</div><p id="m-pitch" class="text-[10px] text-slate-500 font-bold mt-2">No Data</p></div>
    </div>
</div>
<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzlSJTwWl1b9YGHKiCQsdFi5poIufYHvSVfrWDe_10GXmr_lHm3ML0sK6N3fmwtG-aHKQ/exec";
    function fetchStudentData() {
        const script = document.createElement('script'); script.src = `${GAS_URL}?mode=get_status&user=S1&callback=cb_monitor&_ts=${Date.now()}`;
        document.head.appendChild(script); setTimeout(() => document.head.removeChild(script), 1000);
    }
    window.cb_monitor = function(res) {
        if (!res || !res.data) return;
        const s = JSON.parse(res.data);
        document.getElementById('m-bpm').innerText = s.bpm || "--";
        document.getElementById('m-note').innerText = s.note || "--";
        document.getElementById('m-acc').innerText = (s.acc || "00").padStart(2, '0');
        document.getElementById('m-pitch').innerText = s.pitch ? `${s.pitch} Hz` : "No Data";
        document.getElementById('connIndicator').className = "w-2 h-2 rounded-full bg-green-500 status-pulse";
        document.getElementById('connText').innerText = "Live";
    };
    setInterval(fetchStudentData, 3000); fetchStudentData();
</script>
</body>
</html>
