<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iROOM MONITOR - Live Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #05070A; color: white; overflow: hidden; }
        #gradeBar { height: 100%; width: 0%; transition: width 0.3s ease, background-color 0.3s ease; }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-6">
<div class="w-full max-w-[460px] space-y-6">
    <div class="flex justify-between items-center px-4">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter text-blue-500 leading-none">iROOM MONITOR</h1>
            <p id="targetLabel" class="text-[10px] font-bold text-slate-600 uppercase tracking-widest mt-2 italic">Connecting...</p>
        </div>
        <div id="connIndicator" class="bg-slate-900 px-3 py-1 rounded-full text-[10px] font-black uppercase text-red-500">Standby</div>
    </div>

    <div id="m-card" class="bg-slate-900 rounded-[3.5rem] p-12 border border-white/5 text-center shadow-2xl transition-all duration-300">
        <span class="text-[11px] font-black text-blue-400 uppercase italic mb-6 block tracking-[0.3em] opacity-60">Performance Note</span>
        <div id="m-note" class="text-9xl font-black tracking-tighter leading-none mb-6 text-white">--</div>
        <div id="m-detail" class="text-sm font-bold text-slate-500 uppercase tracking-widest italic">Waiting...</div>
        <div class="h-2.5 w-full bg-white/5 rounded-full mt-10 overflow-hidden"><div id="gradeBar"></div></div>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="bg-slate-900 p-8 rounded-[2.5rem] border border-white/5">
            <span class="text-[10px] font-black text-slate-500 uppercase mb-2 block italic tracking-widest">Grade</span>
            <div id="m-acc" class="text-6xl font-black tracking-tighter">--</div>
        </div>
        <div class="bg-slate-900 p-8 rounded-[2.5rem] border border-white/5 text-right flex flex-col justify-between">
            <span class="text-[10px] font-black text-blue-400 uppercase mb-2 block italic tracking-widest">Pitch</span>
            <div id="m-pitch" class="text-4xl font-black tracking-tighter">--</div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzop2ZAe4sv5FGaT4DSqEdsJMEmQpdKzuhk6qaNsnHIFe91BnrRBDH8W7m-gIAVHRopFA/exec";
    let baseRow = -1;

    function fetchUpdate() {
        const script = document.createElement('script');
        script.src = `${GAS_URL}?mode=get_status&callback=cb&_=${Date.now()}`;
        document.head.appendChild(script);
        setTimeout(() => { if(document.head.contains(script)) document.head.removeChild(script); }, 1000);
    }

    window.cb = function(res) {
        if (!res || !res.data) return;
        const d = res.data;
        if (baseRow === -1) {
            baseRow = d.r;
            document.getElementById('targetLabel').innerText = `Monitoring: Active`;
        } else if (d.r > baseRow) {
            updateUI(d);
            document.getElementById('connIndicator').innerText = "Live";
            document.getElementById('connIndicator').className = "bg-green-500/20 px-3 py-1 rounded-full text-[10px] font-black text-green-500";
        }
    };

    function updateUI(d) {
        const grade = d.a.split(' ')[0];
        document.getElementById('m-note').innerText = d.n.split(' ')[0];
        document.getElementById('m-detail').innerText = d.n;
        document.getElementById('m-pitch').innerText = d.p + "Hz";
        document.getElementById('m-acc').innerText = grade;

        const mainCard = document.getElementById('m-card');
        const accLabel = document.getElementById('m-acc');
        const bar = document.getElementById('gradeBar');

        if (grade.includes("A")) {
            mainCard.style.backgroundColor = '#064e3b'; accLabel.style.color = '#10b981';
            bar.style.width = grade === "A+" ? "100%" : "92%"; bar.style.backgroundColor = "#10b981";
        } else if (grade.includes("B")) {
            mainCard.style.backgroundColor = '#422006'; accLabel.style.color = '#fbbf24';
            bar.style.width = grade === "B+" ? "87%" : "82%"; bar.style.backgroundColor = "#fbbf24";
        } else if (grade.includes("C")) {
            mainCard.style.backgroundColor = '#431407'; accLabel.style.color = '#f97316';
            bar.style.width = grade === "C+" ? "77%" : "72%"; bar.style.backgroundColor = "#f97316";
        } else {
            mainCard.style.backgroundColor = '#450a0a'; accLabel.style.color = '#ef4444';
            bar.style.width = "40%"; bar.style.backgroundColor = "#ef4444";
        }
    }
    setInterval(fetchUpdate, 500);
</script>
</body>
</html>
