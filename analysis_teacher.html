<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iROOM Analysis - Teacher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #0F172A; color: white; }
        .data-card { transition: background-color 0.3s ease, transform 0.2s ease; }
        .meter-bar { height: 4px; background: #334155; border-radius: 2px; overflow: hidden; margin-top: 8px; }
        #centsBar { height: 100%; width: 50%; transition: width 0.3s ease, background-color 0.3s ease; margin-left: 25%; }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-6">
<div class="w-full max-w-[480px] space-y-4">
    <div class="flex justify-between items-center px-2">
        <div><h1 class="text-2xl font-black italic tracking-tighter text-blue-400">iROOM MONITOR</h1><p class="text-[10px] font-bold text-slate-500 uppercase">Live Teacher View</p></div>
        <div id="connIndicator" class="bg-slate-800 px-3 py-1 rounded-full text-[10px] font-bold uppercase text-red-500">Wait</div>
    </div>

    <div id="m-card" class="data-card bg-slate-900 rounded-[2.5rem] p-8 shadow-2xl border border-slate-800">
        <div class="flex justify-between items-start">
            <div>
                <span class="text-[10px] font-black text-blue-400 uppercase italic mb-2 block">Accuracy</span>
                <div class="flex items-baseline gap-1"><div id="m-acc" class="text-7xl font-black tracking-tighter">00</div><div class="text-xl font-bold text-blue-400">%</div></div>
            </div>
            <div class="text-right">
                <div id="m-note" class="text-6xl font-black leading-none">--</div>
                <div id="m-cents" class="text-xs font-bold text-slate-400 mt-2">0 cents</div>
            </div>
        </div>
        <div class="meter-bar mt-6"><div id="centsBar"></div></div>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="bg-slate-800 p-6 rounded-[2rem] border border-slate-700">
            <span class="text-[10px] font-black text-slate-400 uppercase mb-2 block italic">Student BPM</span>
            <div id="m-bpm" class="text-4xl font-black tracking-tighter">--</div>
        </div>
        <div class="bg-slate-800 p-6 rounded-[2rem] border border-slate-700 text-right">
            <span class="text-[10px] font-black text-slate-400 uppercase mb-2 block italic">Frequency</span>
            <div id="m-pitch" class="text-3xl font-black tracking-tighter text-blue-400">--</div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwXed035mJ0V11U75_8Gb-5Bj2YvGIlkwEWjAc163LnxRSqozOpyo7f9ox8RnJFNwv00w/exec";
    
    function fetchStudentData() {
        const script = document.createElement('script');
        script.src = `${GAS_URL}?mode=get_status&user=S1&callback=cb_monitor&_ts=${Date.now()}`;
        document.head.appendChild(script);
        setTimeout(() => document.head.removeChild(script), 400);
    }
    
    window.cb_monitor = function(res) {
        if (!res || !res.data) return;
        const s = typeof res.data === 'string' ? JSON.parse(res.data) : res.data;
        
        document.getElementById('m-bpm').innerText = s.b || "--";
        document.getElementById('m-note').innerText = s.n || "--";
        document.getElementById('m-acc').innerText = (s.a || "00").padStart(2, '0');
        document.getElementById('m-pitch').innerText = s.p ? `${s.p}Hz` : "--";
        document.getElementById('m-cents').innerText = `${s.c > 0 ? '+' : ''}${s.c || 0} cents`;
        
        // 시각적 반응 연동
        const card = document.getElementById('m-card');
        const bar = document.getElementById('centsBar');
        const c = s.c || 0;
        
        // 게이지 위치 계산 (중앙에서 좌우로)
        bar.style.width = Math.abs(c) + "%";
        bar.style.marginLeft = c >= 0 ? "50%" : (50 - Math.abs(c)) + "%";

        if (Math.abs(c) < 10) {
            card.style.backgroundColor = '#064e3b'; bar.style.backgroundColor = '#10b981';
        } else if (c >= 10) {
            card.style.backgroundColor = '#78350f'; bar.style.backgroundColor = '#f59e0b';
        } else {
            card.style.backgroundColor = '#1e3a8a'; bar.style.backgroundColor = '#3b82f6';
        }
        
        const conn = document.getElementById('connIndicator');
        conn.innerText = "Live"; conn.classList.replace('text-red-500', 'text-green-500');
    };
    
    setInterval(fetchStudentData, 500); fetchStudentData();
</script>
</body>
</html>
